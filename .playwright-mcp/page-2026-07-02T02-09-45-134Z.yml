                          - cell "To set up and test Agentforce Lead Nurturing:" [ref=e356]
                          - cell "Configure Agentforce SDR Agent" [ref=e357]
                    - paragraph [ref=e358]: In Testing Center, set test conditions, upload a CSV file, and view the resulting intro emails.
                  - list [ref=e359]:
                    - listitem [ref=e360]:
                      - generic [ref=e361]:
                        - text: In Setup, enter Testing Center in the Quick Find box. Then click
                        - strong [ref=e362]: Testing Center
                        - text: .
                    - listitem [ref=e363]:
                      - generic [ref=e364]:
                        - text: Click
                        - strong [ref=e365]: New Test
                        - text: .
                    - listitem [ref=e366]:
                      - generic [ref=e367]:
                        - text: Give your test a name and choose the Agentforce Lead Nurturing agent as the agent to test. Add a description for your test if you wish. Click
                        - strong [ref=e368]: Next
                        - text: .
                    - listitem [ref=e369]:
                      - generic [ref=e370]:
                        - text: On the Test Conditions page, click
                        - strong [ref=e371]: Include context variables
                        - text: . Context variables define the conditions for your testing scenario, such as whether you’re testing leads, contacts, or person accounts, intro emails or nudges, etc.
                    - listitem [ref=e372]:
                      - generic [ref=e373]:
                        - text: From the list of context variables, select the variables needed for your test. Then click
                        - strong [ref=e374]: Next
                        - text: .
                      - generic [ref=e375]: For testing intro emails, choose the Record Type, Email Scenario, Action Cadence Step Tracker ID, and Record variables.
                    - listitem [ref=e376]:
                      - generic [ref=e377]:
                        - text: On the Test Data tab,
                        - strong [ref=e378]: Upload Test Cases (.csv)
                        - text: is selected by default. Use this option to create and upload a CSV file. Click
                        - strong [ref=e379]: Template
                        - text: to download a CSV file containing the columns you’ll need for your test. You’ll fill in only the columns needed for testing intro emails.
                    - listitem [ref=e380]:
                      - text: Open the template CSV file in a spreadsheet editor like Microsoft Excel or Google Sheets. Delete the placeholder data beginning on row two. Then populate the rows with the lead, contact, or person account records and the associated context values that define your intro email testing scenario. For intro emails, the CSV file includes these columns.
