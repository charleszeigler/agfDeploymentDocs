                - heading "Batch Test Lead Nurturing Introductory Emails in Testing Center" [level=1] [ref=e331]
                - paragraph [ref=e332]: To see how your Lead Nurturing agent generates initial emails at scale to prospects using the prospect record details and the Draft Initial Outreach Email prompt template action, use Testing Center.
                - generic [ref=e333]:
                  - heading "Required Editions" [level=3] [ref=e335]
