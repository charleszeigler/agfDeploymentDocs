                - heading "Set Up Agentforce Lead Nurturing" [level=1] [ref=e329]
                - paragraph [ref=e330]: Learn about the configuration steps that enable your Lead Nurturing agent.
                - generic [ref=e331]:
                  - heading "Required Editions" [level=3] [ref=e333]
                  - generic [ref=e335]:
                    - table [ref=e336]:
                      - rowgroup [ref=e339]:
                        - 'row "Available in: Lightning Experience in Enterprise, Performance, and Unlimited editions with Sales and Einstein for Sales." [ref=e340]':
                          - 'cell "Available in: Lightning Experience in Enterprise, Performance, and Unlimited editions with Sales and Einstein for Sales." [ref=e341]':
                            - text: "Available in: Lightning Experience in"
                            - strong [ref=e342]: Enterprise
                            - text: ","
                            - strong [ref=e343]: Performance
                            - text: ", and"
                            - strong [ref=e344]: Unlimited
                            - text: editions with Sales and Einstein for Sales.
                    - table [ref=e345]:
                      - rowgroup [ref=e349]:
                        - row "User Permissions Needed" [ref=e350]:
                          - columnheader "User Permissions Needed" [ref=e351]
                      - rowgroup [ref=e352]:
                        - 'row "To set up Agentforce Lead Nurturing: Configure Agentforce SDR Agent" [ref=e353]':
                          - cell "To set up Agentforce Lead Nurturing:" [ref=e354]
                          - cell "Configure Agentforce SDR Agent" [ref=e355]
                    - generic [ref=e357]:
                      - img "Note" [ref=e360]
                      - generic [ref=e361]: Note The Agentforce SDR name has changed to Agentforce Lead Nurturing. The new name better describes the work the agent does to nurture existing prospects and differentiates it from the Agentforce Lead Generation agent template.
                    - paragraph [ref=e362]:
                      - text: For a video overview of Agentforce Lead Nurturing, see
                      - link "Scale Your Sales Funnel with Agentforce SDR" [ref=e363] [cursor=pointer]:
                        - /url: https://salesforce.vidyard.com/watch/K5TArfU5FpkWYUvpBL82cv
                      - text: .
                    - paragraph [ref=e364]: The Agentforce Lead Nurturing setup process guides you through these main steps.
                  - list [ref=e365]:
                    - listitem [ref=e366]: Turn on Lead Nurturing, along with the four supporting features the agent uses to do its outreach work.
                    - listitem [ref=e367]: Assign permissions so managers and sales reps can work with the agent. These permissions let managers configure the Lead Nurturing agent and let sales reps assign prospects to the agent.
                    - listitem [ref=e368]: Create a user record for your agent. This user record and its permissions let your agent operate as a user in your organization. The agent user has a special Einstein Agent license that lets it work autonomously. Agentforce assigns user permissions, sets up Einstein Activity Capture, and connects an email account so the agent can do its work. Note that Agentforce Lead Nurturing requires user-level authentication for EAC rather than org-level authentication.
                    - listitem [ref=e369]: Configure data for your agent. These are files you can upload to give the agent specific information about your business, products, and services. The agent uses these to generate high-quality introductory email and answers to prospect questions.
                    - listitem [ref=e370]: Configure and activate your agent. Set options for how your Lead Nurturing agent behaves when it's active.
                    - listitem [ref=e371]: To let sales users see the agent's emails in the Activity Timeline of prospects, ensure that each user has connected their email address to Einstein Activity Capture in their user profile.
                  - generic [ref=e374]:
                    - img "Note" [ref=e377]
                    - generic [ref=e378]:
                      - link:
                        - /url: https://help.salesforce.com/s?language=en_US
                      - text: Note To make changes to a configured Lead Nurturing agent, use Agentforce Builder rather than the Guided Setup experience in Salesfocre Go.
                  - list [ref=e379]:
                    - listitem [ref=e380]:
                      - strong [ref=e381]:
                        - link "Turn On Lead Nurturing" [ref=e382] [cursor=pointer]:
                          - /url: https://help.salesforce.com/s/articleView?id=sales.sales_agent_sdr_setup_enable_sdr.htm&language=en_US&type=5
                      - text: Agentforce Lead Nurturing performs sales outreach tasks automatically in your organization. The first part of setting it up is to turn it on and enabling several supporting features it uses to do its work. Agentforce turns on the additional features automatically.
                    - listitem [ref=e383]:
                      - strong [ref=e384]:
                        - link "Assign Agentforce User Permissions for Lead Nurturing" [ref=e385] [cursor=pointer]:
                          - /url: https://help.salesforce.com/s/articleView?id=sales.sales_agent_sdr_setup_sales_user_perms.htm&language=en_US&type=5
                      - text: To configure and use Agentforce Lead Nurturing, sales users and administrators need specific permissions. Agentforce Setup lets you assign them quickly.
                    - listitem [ref=e386]:
                      - strong [ref=e387]:
                        - link "Manage Your Agent’s User Record and Email" [ref=e388] [cursor=pointer]:
                          - /url: https://help.salesforce.com/s/articleView?id=sales.sales_agent_sdr_setup_create_agent_user_parent.htm&language=en_US&type=5
                      - text: An Agentforce Lead Nurturing agent operates like a regular user in your organization, but with special permissions. Lead Nurturing setup makes it easy to choose or create a user record. Agentforce then assigns it permissions, and sets up Einstein Activity Capture and email for it.
                    - listitem [ref=e389]:
                      - strong [ref=e390]:
                        - link "Configure Data for Your Lead Nurturing Agent" [ref=e391] [cursor=pointer]:
                          - /url: https://help.salesforce.com/s/articleView?id=sales.sales_agent_sdr_setup_data_cloud.htm&language=en_US&type=5
                      - text: To manage the data your agent uses to answer questions and complete tasks, select or create a data library in Agentforce Data Library Setup.
                    - listitem [ref=e392]:
                      - strong [ref=e393]:
                        - link "Build Your Lead Nurturing Agent" [ref=e394] [cursor=pointer]:
                          - /url: https://help.salesforce.com/s/articleView?id=sales.sales_agent_sdr_setup_agent_builder.htm&language=en_US&type=5
                      - text: Configure the details of your Lead Nurturing agent based on when and how often you want the agent to perform outreach, language and tone, and when to assign prospects to the agent automatically. Then to start working prospects, activate your agent.
                    - listitem [ref=e395]:
                      - strong [ref=e396]:
                        - link "Connect User Email Accounts to Einstein Activity Capture" [ref=e397] [cursor=pointer]:
                          - /url: https://help.salesforce.com/s/articleView?id=sales.sales_agent_sdr_setup_connect_user_email_to_eac.htm&language=en_US&type=5
                      - text: Users can see the agent’s emails on the Activity Timeline of lead, contact, and person account records. To let sales users view, edit, reschedule, or cancel Lead Nurturing agent emails on the Activity Timeline of prospect records, be sure each user has connected their email account in their user profile. Connecting the user email account to EAC lets agent emails include meeting booking links for prospect owners. You make changes to agent emails in the Email Composer.
