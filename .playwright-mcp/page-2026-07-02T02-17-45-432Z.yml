                  - text: for your agent. These include a Welcome Message, an Error Message, and (for Service Agents) an Escalation Message. These messages are written in a single language.
                - paragraph [ref=e702]: At the start of the chat session, Agentforce decides whether or not to translate the System Messages based on the three main language settings.
