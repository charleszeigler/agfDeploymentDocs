              - generic [ref=e678]:
                - heading "How It Works" [level=2] [ref=e679]
                - paragraph [ref=e680]: Agentforce architecture is designed to handle language variations by using several key variables and processes. These components ensure that your agents interpret multilingual user inputs accurately and respond in the correct language.
                - paragraph [ref=e681]: "Agentforce uses three main language settings:"
                - list [ref=e682]:
                  - listitem [ref=e683]:
                    - strong [ref=e684]: "End User Language:"
                    - text: This setting represents the user's input language. Its value is explicitly defined by the agent channel (or client). How this setting is populated depends on the type of agent channel being used.
                    - list [ref=e685]:
                      - listitem [ref=e686]:
                        - text: For agents connected to the Agentforce panel in the Lightning Experience (for example, Agentforce Employee agents), the end-user language is set from the Salesforce user's language settings for the org. See
                        - link "Edit Your Language and Locale Settings" [ref=e687] [cursor=pointer]:
                          - /url: https://help.salesforce.com/s/articleView?id=xcloud.usersetup_lang_time_zone.htm&language=en_US&type=5
                        - text: .
                      - listitem [ref=e688]:
                        - text: For agents connected to Enhanced Chat v1 (for example, Agentforce Service agents), the admin sets up a pre-chat field that determines the end-user language. See
                        - link "Use Additional Languages in Enhanced Chat v1 Conversations" [ref=e689] [cursor=pointer]:
                          - /url: https://help.salesforce.com/s/articleView?id=ai.service_agent_languages.htm&language=en_US&type=5#service_agent_languages
                        - text: .
                      - listitem [ref=e690]:
                        - text: For agents connected to other channels (for example, Agentforce Lead Nurturing), you can set the end-user language by using the Agent API. See
                        - link "Send Agent Variables with the Agent API" [ref=e691] [cursor=pointer]:
                          - /url: https://developer.salesforce.com/docs/ai/agentforce/guide/agent-api-variables.html
                        - text: .
                  - listitem [ref=e692]:
                    - strong [ref=e693]: "Agent Default Language:"
                    - text: This is the primary or fallback language that you specify for an agent. An agent uses the default language if no language is detected at the start of a session or if the detected language isn’t supported. See
                    - link "Update Language Settings" [ref=e694] [cursor=pointer]:
                      - /url: https://help.salesforce.com/s/articleView?id=ai.copilot_setup_tone.htm&language=en_US&type=5
                    - text: .
                  - listitem [ref=e695]:
                    - strong [ref=e696]: "Agent Allowed Languages:"
                    - text: This is a set of secondary supported languages you specify that an agent can switch to based on language detection. See
                    - link "Update Language Settings" [ref=e697] [cursor=pointer]:
                      - /url: https://help.salesforce.com/s/articleView?id=ai.copilot_setup_tone.htm&language=en_US&type=5
                    - text: .
