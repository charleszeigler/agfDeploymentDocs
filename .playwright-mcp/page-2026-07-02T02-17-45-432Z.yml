              - generic [ref=e770]:
                - 'heading "Example: Language Switching with Multiple Configured Languages" [level=2] [ref=e771]'
                - generic [ref=e773]:
                  - img "Note" [ref=e776]
                  - generic [ref=e777]:
                    - text: Note Only agents created in the
                    - link "New Agentforce Builder" [ref=e778] [cursor=pointer]:
                      - /url: https://help.salesforce.com/s/articleView?id=ai.agent_builder_intro.htm&language=en_US&type=5
                    - text: support Language Switching.
                - paragraph [ref=e779]: When an agent is configured with multiple languages, the agent prioritizes the language of the user’s input within a conversation if it’s one of the configured languages. For example, consider an agent configured with English as the default language and Portuguese and Spanish as additional languages.
                - list [ref=e780]:
                  - listitem [ref=e781]: At the start of the session, the end user's language is set to English.
                  - listitem [ref=e782]: The user asks a question in Spanish, and the agent responds in Spanish.
                  - listitem [ref=e783]: The user then asks a question in English (in the same conversation), and the agent switches and responds in English, even though the user’s default language is Spanish.
                  - listitem [ref=e784]: The user then asks a question in Portuguese (in the same conversation), and the agent switches again and responds in Portuguese.
                  - listitem [ref=e785]: "When the agent executes an action, action outputs are in the end user language (English) throughout the entire session. But the agent's response, which wraps around the action output, is dynamic. So it's possible to see mixed-language responses, like \"Asunto: Issues with Canvas.\""
                - paragraph [ref=e786]:
                  - img "In this chat transcript example, notice how the agent responds in the same language as each of the user’s questions, even when the user alternates between Spanish, English, and Portuguese." [ref=e788]
                - paragraph [ref=e789]: The agent respects the languages it’s configured to understand. If a user asks a question in a language the agent is not configured for, the agent may not provide an answer in that language. Instead, it explains that it can’t respond in the user’s language. For example, if a user asks a question in Italian and the agent isn’t configured to use Italian, the agent responds in Italian to explain the languages it supports.
                - paragraph [ref=e790]:
                  - 'img "Unsupported Language Handling: The user asks in Italian, “What is my last open case?” The agent replies in Italian, but only to say, “I’m sorry, but I can only answer in English, Portuguese, or Spanish. Could you repeat your question in one of these languages?”" [ref=e792]'
                - paragraph [ref=e793]: This behavior ensures the agent is responsive to the immediate language of the user’s message, while also maintaining boundaries for languages it isn’t set up to handle.
