                - heading "Testing Lead Nurturing Actions and Email with Agentforce Builder Preview" [level=1] [ref=e336]
                - paragraph [ref=e337]: When preparing to use Agentforce Lead Nurturing, you can ensure you’re satisfied with the agent’s work by testing how the agent generates and schedules its emails. When you test in Agentforce Builder, you can sanity check your agent’s subagents and actions individually.
                - generic [ref=e338]:
                  - heading "Required Editions" [level=3] [ref=e340]
                  - table [ref=e342]:
                    - rowgroup [ref=e345]:
                      - 'row "Available in: Lightning Experience in Enterprise, Performance, and Unlimited editions with Sales and Einstein for Sales." [ref=e346]':
                        - 'cell "Available in: Lightning Experience in Enterprise, Performance, and Unlimited editions with Sales and Einstein for Sales." [ref=e347]':
                          - text: "Available in: Lightning Experience in"
                          - strong [ref=e348]: Enterprise
                          - text: ","
                          - strong [ref=e349]: Performance
                          - text: ", and"
                          - strong [ref=e350]: Unlimited
                          - text: editions with Sales and Einstein for Sales.
                  - paragraph [ref=e351]:
                    - text: Agentforce Builder lets you test how your Lead Nurturing agent generates intro emails, nudges, and replies to prospect emails. For each use case scenario you want to test [intro, nudge, reply], start a new Agentforce Builder testing session by clicking
                    - strong [ref=e352]: Refresh
                    - text: in the side panel.
                  - paragraph [ref=e353]: In Agentforce Builder, choose an agent action to test, enter testing scenario values, enter a specific utterance in the chat window, and view the resulting agent email.
                  - list [ref=e354]:
                    - listitem [ref=e355]:
                      - strong [ref=e356]:
                        - link "Testing Lead Nurturing Introductory Emails in Agentforce Builder" [ref=e357] [cursor=pointer]:
                          - /url: https://help.salesforce.com/s/articleView?id=sales.sales_agent_sdr_test_intro_email.htm&language=en_US&type=5
                      - text: To see how your Lead Nurturing agent generates initial emails to prospects using the prospect record details and the Draft Initial Outreach Email prompt template, use the Preview panel in Agentforce Builder.
                    - listitem [ref=e358]:
                      - strong [ref=e359]:
                        - link "Testing Lead Nurturing Nudge Emails in Agentforce Builder" [ref=e360] [cursor=pointer]:
                          - /url: https://help.salesforce.com/s/articleView?id=sales.sales_agent_sdr_test_nudge_email.htm&language=en_US&type=5
                      - text: To see how your Lead Nurturing agent generates nudge emails to prospects who haven’t yet replied, use the Preview panel in Agentforce Builder. The agent generates nudge emails using the lead, contact, or person account record details and the Draft Nudge Email prompt template.
                    - listitem [ref=e361]:
                      - strong [ref=e362]:
                        - link "Testing Lead Nurturing Reply Emails in Agentforce Builder" [ref=e363] [cursor=pointer]:
                          - /url: https://help.salesforce.com/s/articleView?id=sales.sales_agent_sdr_test_reply_email.htm&language=en_US&type=5
                      - text: To see how your Lead Nurturing agent generates reply emails to prospects, use the Preview panel in Agentforce Builder. The agent generates its reply email using the prospect’s email response and the Draft Generic Reply Email, Draft Meeting Request Email, Draft Question Answer Email, or Opt Out Lead prompt templates.
