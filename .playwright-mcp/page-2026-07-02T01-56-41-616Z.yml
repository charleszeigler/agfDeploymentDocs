      - generic [ref=e157]:
        - 'heading "Agentforce : Metadata Deployment and Retrieval Limitations for SDR and Sales Coach Agents" [level=1] [ref=e158]'
        - generic [ref=e160]: "Publish Date: May 28, 2026"
        - generic [ref=e161]:
          - generic [ref=e163]: Description
          - generic [ref=e164]:
            - paragraph [ref=e165]:
              - text: Metadata Deployment and Retrieval Not Supported
              - text: "- SDR and Sales Coach Agents cannot be deployed or retrieved using metadata deployment methods i.e., cannot be deployed from one org to another. This is a known limitation and is expected behavior within our system."
            - heading "Important Clarification" [level=2] [ref=e166]
            - paragraph [ref=e167]: Although metadata deployment is not supported, customers may occasionally observe that deployment succeeds in some orgs and fails in others.
            - paragraph [ref=e168]: This behavior is inconsistent and expected, because the functionality is not officially supported.
            - paragraph [ref=e169]: "Due to this limitation:"
            - list [ref=e170]:
              - listitem [ref=e171]:
                - paragraph [ref=e172]: Deployment may succeed in some environments
              - listitem [ref=e173]:
                - paragraph [ref=e174]: Deployment may fail in other environments
              - listitem [ref=e175]:
                - paragraph [ref=e176]: Behavior may vary across orgs and instances
        - generic [ref=e177]:
          - generic [ref=e178]: Resolution
          - generic [ref=e179]:
            - heading "Recommended Approach" [level=2] [ref=e180]
            - paragraph [ref=e181]: Salesforce recommends not attempting metadata deployment for SDR Agents or Sales Coach Agents.
            - paragraph [ref=e182]: Instead, these agents should be created and configured directly in the target org.
        - generic [ref=e183]:
